<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="setup-hooks.js"></script>
  <script src="mxd-hooks.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- ============ CORE MODULES (ORDER MATTERS!) ============ -->
  
  <!-- VORTEX MODULES v30.0.0 - Upgraded 30x -->
  <script src="mxd-shapes-vortex.js"></script>
  <script src="mxd-batch-processor-vortex.js"></script>
  <script src="mxd-puzzle-optimizer-vortex.js"></script>
  <script src="mxd-ai-engine-vortex.js"></script>
  <script src="mxd-dimension-manager-vortex.js"></script>
  <script src="mxd-quality-modes-vortex.js"></script>
  <script src="mxd-bulk-ultimate-vortex.js"></script>
  <script src="mxd-word-processor-vortex.js"></script>
  <script src="mxd-error-recovery-vortex.js"></script>

  <!-- ============ OMNI-NEXUS v11.0 MODULES ============ -->
  <!-- Quantum Grid Engine: WebGPU/WASM-powered generation -->
  <script src="quantum-grid-engine.js"></script>
  
  <!-- Swarm Consensus: Multi-API AI validation -->
  <script src="swarm-consensus.js"></script>
  
  <!-- Temporal Error Boundary: Self-healing React wrapper -->
  <script src="temporal-error-boundary.js"></script>
  
  <!-- Hybrid Grid Engine: Multi-puzzle integration -->
  <script src="hybrid-grid-engine.js"></script>
  
  <!-- Generative Theme Engine: AI-powered theming -->
  <script src="generative-theme-engine.js"></script>
  
  <!-- Shape Generator: AI Prompt-to-Shape -->
  <script src="shape-generator.js"></script>
  
  <!-- Master Archiver: KDP Command Center -->
  <script src="master-archiver.js"></script>
  
  <!-- Neuro-Adaptive UI: User behavior tracking -->
  <script src="neuro-adaptive-ui.js"></script>

  <!-- Core: Settings + Engine + Data + PDF -->
  <script src="core.js"></script>

  <!-- API Keys + AI Integration -->
  <script src="mxd-api-keys.js"></script>
  <script src="mxd-ai-integrator.js"></script>

  <!-- Processors: Bulk + Batch + Enterprise + Export -->
  <script src="processor.js"></script>

  <!-- System: Offline + Security + Support -->
  <script src="system.js"></script>

  <!-- ============ AUTH MODULES ============ -->
  <!-- Auth: Session Management -->
  <script src="mxd-auth.js"></script>

  <!-- Subscription: Plan Management -->
  <script src="mxd-subscription.js"></script>

  <!-- Auth Extended: UI Modals + Usage Tracking -->
  <script src="auth.js" type="text/babel" data-presets="react"></script>

  <!-- ============ UI COMPONENTS (React) ============ -->
  <!-- UI: Base Components + Grid + Panels -->
  <script src="ui.jsx" type="text/babel" data-presets="react"></script>

  <!-- Sidebar: Full sidebar with all settings -->
  <script src="sidebar.jsx" type="text/babel" data-presets="react"></script>

  <!-- App: Main application -->
  <script src="app.jsx" type="text/babel" data-presets="react"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => console.log('SW registered:', registration.scope))
          .catch(error => console.log('SW registration failed:', error));
      });
    }
  </script>

  <!-- Loading Screen -->
  <style>
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#09090b;color:#ececf0;}
    .loading-logo{font-size:48px;font-weight:900;margin-bottom:20px;}
    .loading-logo span:nth-child(1){color:#c9a227;}
    .loading-logo span:nth-child(2){color:#ececf0;}
    .loading-logo span:nth-child(3){color:#ef4444;}
    .loading-spinner{width:40px;height:40px;border:3px solid rgba(201,162,39,0.3);border-top-color:#c9a227;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
    .loading-text{font-size:14px;color:#9ca3af;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <div class="loading-screen" id="loading">
    <div class="loading-logo"><span>M</span><span>X</span><span>D</span></div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading MXD Word Search Generator...</div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) { loading.style.opacity = '0'; loading.style.transition = 'opacity 0.3s'; setTimeout(() => loading.remove(), 300); }
      }, 500);
    });
  </script>
</body>
</html>
