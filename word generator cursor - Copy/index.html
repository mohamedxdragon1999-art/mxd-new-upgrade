body.sunset{--bg:#1c1917;--panel:#292524;--glass:rgba(255,255,255,0.04);--t1:#fed7aa;--t2:#fb923c;--t3:#78350f;--accent:#f97316;--hl:#fb923c;--border:rgba(255,255,255,0.06)}
body.peach{--bg:#fff7ed;--panel:#ffedd5;--glass:rgba(0,0,0,0.03);--t1:#7c2d12;--t2:#c2410c;--t3:#fdba74;--accent:#ea580c;--hl:#c2410c;--border:rgba(0,0,0,0.06)}
body.slate{--bg:#0f172a;--panel:#1e293b;--glass:rgba(255,255,255,0.04);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--accent:#64748b;--hl:#94a3b8;--border:rgba(255,255,255,0.06)}

body.mocha{--bg:#1c1510;--panel:#2a2118;--glass:rgba(255,255,255,0.04);--t1:#e7e5e4;--t2:#a8a29e;--t3:#57534e;--accent:#78716c;--hl:#a8a29e;--border:rgba(255,255,255,0.06)}

body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;transition:background .3s,color .3s}
.app{display:flex;height:100vh}
.sb{width:310px;min-width:310px;height:100%;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--glass);flex-shrink:0}
.sb-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-brand h1{font-size:13px;font-weight:800}
.sb-brand span{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sb-body{flex:1;overflow-y:auto;padding:8px}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--glass);border-radius:2px}
.sb-foot{padding:10px 12px;border-top:1px solid var(--border);background:var(--glass);flex-shrink:0}
.sec{margin-bottom:5px;border-radius:var(--radius);overflow:hidden;background:var(--glass);border:1px solid var(--border)}
.sec-hd{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-hd:hover{background:rgba(255,255,255,0.03)}
.sec-ttl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
.sec-ico{font-size:12px}
.sec-bdg{background:var(--accent);color:#fff;font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700}
.sec-ch{font-size:10px;color:var(--t3);transition:transform .2s}
.sec-ch.shut{transform:rotate(-90deg)}
.sec-bd{padding:9px 12px 11px;border-top:1px solid var(--border)}
.sec-bd.shut{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-r{display:flex;align-items:center;gap:6px}
.tb-info{font-size:10px;color:var(--t3)}
.vtog{display:flex;background:var(--glass);border-radius:8px;padding:3px;gap:2px}
.vtog button{padding:5px 12px;border:none;background:transparent;color:var(--t3);border-radius:6px;cursor:pointer;font-size:10px;font-weight:600;transition:all .2s}
.vtog button.on{background:var(--panel);color:var(--t1)}
.vtog button:hover:not(.on){color:var(--t1)}
.pza{flex:1;overflow-y:auto;padding:20px;display:flex;justify-content:center}
.pzc{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:0;max-width:98%;color:#1a1a2e;position:relative;overflow:hidden}
.pz-t{font-size:22px;font-weight:800;text-align:center;width:100%;outline:none;border:none;background:transparent;color:#1a1a2e;margin:16px 0 10px;font-family:inherit}
.pz-t::placeholder{color:#aaa}
.gw{position:relative;margin:12px auto;display:inline-block}
.gg{display:grid;position:relative}
.gc{display:flex;align-items:center;justify-content:center;font-weight:700;user-select:none;cursor:crosshair;transition:background .1s}
.gc:hover{background:rgba(108,99,255,0.08)!important}
.gsvg{position:absolute;top:0;left:0;pointer-events:none}
.wls{margin-top:16px;border-top:2px solid rgba(0,0,0,0.1);padding-top:12px;width:100%;overflow:hidden}
.wlt{display:flex;align-items:center;margin-bottom:6px}
.wlb{font-weight:400;opacity:0.6}
.wlg{display:grid;gap:4px;overflow:hidden}
.wp{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(0,0,0,0.06);color:inherit;text-align:center;transition:all .2s}
.wp.fnd{background:#dcfce7 !important;color:#166534;text-decoration:line-through;opacity:.7}
.fm{text-align:center;font-size:11px;color:#888;margin-top:8px}
.tog-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.tog-l{font-size:11px;font-weight:500}
.tog-s{position:relative;width:32px;height:17px;flex-shrink:0}
.tog-s input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;transition:.3s;border-radius:17px}
.tog-sl:before{position:absolute;content:"";height:11px;width:11px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
input:checked+.tog-sl{background:var(--ok)}
input:checked+.tog-sl:before{transform:translateX(15px)}
.slw{margin-bottom:9px}
.slh{display:flex;justify-content:space-between;margin-bottom:3px}
.lbl{font-size:10px;color:var(--t2)}
.slv{font-size:10px;font-weight:700;color:var(--hl)}
input[type=range]{width:100%;height:3px;background:var(--glass);border-radius:2px;outline:none;-webkit-appearance:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.sel,.txt-in{background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--t1);border-radius:7px;padding:7px 10px;font-size:11px;width:100%;outline:none;font-family:var(--font);transition:border-color .2s}
.sel:focus,.txt-in:focus{border-color:var(--accent)}
.sel{cursor:pointer}
.wta{background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--t1);border-radius:7px;padding:8px 10px;font-size:11px;width:100%;outline:none;font-family:var(--font);resize:vertical;min-height:70px;line-height:1.5}
.wta:focus{border-color:var(--accent)}
.row{display:flex;gap:7px;margin-bottom:7px}
.row>*{flex:1}
.btn{padding:8px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-pri:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,99,255,0.4)}
.btn-sec{background:var(--glass);color:var(--t1);border:1px solid var(--border)}
.btn-sec:hover:not(:disabled){background:rgba(255,255,255,0.08)}
.btn-ok{background:var(--ok);color:#000}
.btn-ok:hover:not(:disabled){opacity:.9}
.btn-full{width:100%}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.chip{padding:4px 9px;border-radius:5px;font-size:9px;background:var(--glass);color:var(--t2);cursor:pointer;border:1px solid transparent;transition:all .2s;font-weight:600}
.chip-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;border:1px solid rgba(255,255,255,0.15)}
.chip:hover{border-color:var(--accent);color:var(--t1)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.wcnt{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin:5px 0}
.wcnt strong{color:var(--hl)}
.info{font-size:9px;color:var(--t3);margin-bottom:7px;padding:7px;background:var(--glass);border-radius:6px;line-height:1.4}
.tmpl-r{display:flex;gap:5px;flex-wrap:wrap}
.tmpl-i{text-align:center;cursor:pointer}
.tmpl-d{width:24px;height:24px;border-radius:6px;border:2px solid transparent;transition:all .2s}
.tmpl-d:hover{transform:scale(1.1)}
.tmpl-d.on{border-color:var(--hl);box-shadow:0 0 8px var(--hl)}
.tmpl-l{font-size:8px;color:var(--t3);margin-top:2px}
.colors{display:flex;gap:5px;flex-wrap:wrap}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.cdot:hover{transform:scale(1.15)}
.cdot.on{border-color:#000}
.shapes-g{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-height:240px;overflow-y:auto;padding-right:2px}
.shapes-g::-webkit-scrollbar{width:3px}
.shapes-g::-webkit-scrollbar-thumb{background:var(--glass);border-radius:2px}
.shp-b{padding:6px 2px;border-radius:6px;background:var(--glass);border:2px solid transparent;cursor:pointer;text-align:center;transition:all .2s;font-size:8px;font-weight:600;color:var(--t2);line-height:1.2}
.shp-b:hover{border-color:var(--accent)}
.shp-b.on{border-color:var(--hl);background:rgba(201,162,39,0.15);color:var(--t1)}
.shp-i{font-size:14px;display:block;margin-bottom:1px}
.shp-cat{font-size:8px;color:var(--t3);font-weight:600;margin:6px 0 3px;text-transform:uppercase;letter-spacing:0.5px;grid-column:1/-1}
.sm{display:flex;gap:4px;margin-bottom:8px}
.sm-it{flex:1;padding:7px 4px;border-radius:7px;background:var(--glass);border:2px solid transparent;cursor:pointer;text-align:center;transition:all .2s}
.sm-it:hover{border-color:var(--accent)}
.sm-it.on{border-color:var(--accent);background:rgba(108,99,255,0.15)}
.sm-n{font-size:10px;font-weight:700;color:var(--t1)}
.sm-d{font-size:8px;color:var(--t3);margin-top:1px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;box-shadow:0 10px 40px rgba(0,0,0,0.5);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;animation:slideUp .3s ease}
.toast.ok{background:linear-gradient(135deg,#059669,#10b981)}
.toast.err{background:linear-gradient(135deg,#dc2626,#ef4444)}
.toast.info{background:linear-gradient(135deg,var(--accent),var(--accent2))}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.prog{margin-top:6px}
.prog-b{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));transition:width .3s}
.prog-t{font-size:9px;color:var(--t3);margin-top:3px;text-align:center}
.king-b{background:linear-gradient(135deg,#ffd700,#ff8c00);padding:9px;border-radius:7px;text-align:center;font-weight:800;color:#000;font-size:11px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.div{height:1px;background:var(--border);margin:8px 0}
.stat-r{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);padding:2px 0}
.stat-v{font-weight:700;color:var(--hl)}
.tab-g{display:flex;gap:4px;margin-bottom:8px}
.tab{border-radius:6px;padding:4px 8px;font-size:9px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.tab.on{background:var(--accent);color:#fff}
.tab:not(.on){background:var(--glass);color:var(--t3)}
.tab:not(.on):hover{color:var(--t1)}
.badge{display:inline-block;background:var(--accent);color:#fff;font-size:8px;padding:1px 5px;border-radius:4px;font-weight:700;margin-left:4px}
.kdp-card{background:var(--glass);border-radius:7px;padding:10px;margin-top:7px}
.kdp-card h4{font-size:10px;font-weight:700;margin-bottom:6px;color:var(--hl)}
.kdp-stat{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);padding:2px 0}
.kdp-v{font-weight:700;color:var(--t1)}
.qs-s{gap:4px;margin-top:6px}
.qs-it{display:flex;justify-content:space-between;font-size:9px;padding:3px 0;border-bottom:1px solid var(--border)}
.qs-it:last-child{border-bottom:none}
.qs-l{color:var(--t3)}
.qs-v{font-weight:700;color:var(--hl)}
.qs-bar{height:3px;background:var(--glass);border-radius:2px;overflow:hidden;margin:1px 0}
.qs-f{height:100%;border-radius:2px;transition:width .5s}
</style>
</head>

// ====================== CAPTURE EXPORT ENGINE ======================
window.CaptureExport={
  // Capture preview card at exact DPI for the selected trim size
  capture:async function(cfg){
    var el=document.querySelector('.pzc')
    if(!el)return null
    await new Promise(function(r){return setTimeout(r,100)})
    var dpi=cfg.dpi||300
    var trim=(window.TRIM_SIZES||[]).find(function(t){return t.id===(cfg.trimSize||'letter')})||{w:612,h:792}
    // Target pixel dimensions for the selected trim at this DPI
    var targetW=Math.round(trim.w/72*dpi)
    var actualW=el.offsetWidth
    if(!actualW||actualW<10)actualW=700
    var scale=targetW/actualW
    try{
      var canvas=await html2canvas(el,{scale:scale,backgroundColor:'#ffffff',useCORS:true,logging:false,allowTaint:true})
      // The canvas should be at targetW x targetH, but rounding may cause slight difference.
      // We store the expected dimensions so PDF embedding uses them exactly.
      canvas._targetW=targetW
      canvas._targetH=Math.round(trim.h/72*dpi)
      return canvas
    }catch(e){console.error('Capture error:',e);return null}
  },
  
  // Export single PNG/JPEG
  exportPNG:async function(cfg){
    var canvas=await this.capture(cfg)
    if(!canvas){window.showToast?.('Capture failed','err');return}
    var link=document.createElement('a')
    var fmt=cfg.imageFormat||'png',mime=fmt==='jpeg'?'image/jpeg':'image/png'
    link.download=(cfg.exportName||cfg.title||'puzzle')+'.'+fmt
    link.href=canvas.toDataURL(mime,fmt==='jpeg'?(cfg.jpegQuality||0.95):undefined)
    link.click()
    window.showToast?.('Exported!','ok')
  }
}

// Puzzle card renderer (plain JS, not Babel - avoids JSX IIFE parsing issues)
window.renderPuzzleCard=function(cfg,puzzle,vw,found,gen,setCfg,onMD,onME,onMU,selC){
  var tmpl=window.TEMPLATES[cfg.template]||window.TEMPLATES.classic
  var isDark=tmpl.bg!=='#ffffff'&&tmpl.bg!=='#faf6f0'
  var trim=(window.TRIM_SIZES||[]).find(function(t){return t.id===(cfg.trimSize||'letter')})||{w:612,h:792}
  var sidebarW=310,availW=Math.min(800,window.innerWidth-sidebarW-40)
  var cardW=availW,cardH=Math.round(cardW*trim.h/trim.w)
  var m=(window.MARGIN_PRESETS||[]).find(function(p){return p.id===(cfg.marginPreset||'standard')})||{top:36,bottom:36,inner:45,outer:36}
  if(cfg.marginPreset==='custom'){m.top=cfg.customMarginTop||36;m.bottom=cfg.customMarginBottom||36;m.inner=cfg.customMarginInner||45;m.outer=cfg.customMarginOuter||36}
  var scale=cardW/trim.w,mt=Math.round(m.top*scale),mb=Math.round(m.bottom*scale),mo=Math.round(m.outer*scale),mi=Math.round(m.inner*scale)
  var mgColor=isDark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.08)'
  // Cell size: use user setting, or auto-calculate only when toggled
  var cs=cfg.cellSize||24
  var showSolP=vw==='solution'
  if(puzzle && cfg.autoCellSize){
    var R=puzzle.rows||15,C=puzzle.cols||15
    var isSolP=showSolP||cfg.showSolution
    var titleH=isSolP?32:22
    // SAME formula as PDF engine
    var MX=mo
    var availW_=cardW-MX*2-2
    var availH_=cardH-mt-mb-titleH-6
    var maxCs=Math.floor(Math.min(availW_/C,availH_/R))
    cs=Math.max(10,Math.min(maxCs,50))
  }
  // Title position: -1=bottom, 0=center, 1=top
  var titlePos=cfg.titlePos||1
  // Scale offsets by card/page ratio to match PDF proportions exactly
  var sc=function(v){return Math.round((v||0)*scale)}
  var titleElem=React.createElement('input',{className:'pz-t',value:cfg.title,onChange:function(e){setCfg(function(p){return{...p,title:e.target.value}})},placeholder:'Word Search Puzzle',style:{color:tmpl.tc,fontSize:cfg.titleFontSize||20,textAlign:'center',width:'100%',border:'none',outline:'none',background:'transparent',fontWeight:800,marginTop:sc(cfg.titleGap),marginLeft:sc(cfg.titleIndent)}})
  // Auto-overflow protection for word list
  var wlElem=null
  if(cfg.showWordList&&puzzle){
    var wlWords=Object.keys(puzzle.placements)
    // Word sorting
    if(cfg.wordSort==='difficulty')wlWords.sort(function(a,b){return a.length-b.length})
    else if(cfg.wordSort==='shuffle')wlWords.sort(function(){return Math.random()-0.5})
    else wlWords.sort()
    var wlCols=cfg.wordColumns||4
    var wlFS=cfg.wordFontSize||11
    var wlPadY=cfg.pillPadY||4
    var gridH=cs*(puzzle.rows||15)
    var availH=cardH-mt-mb-(showSolP||cfg.showSolution?32:22)-6-8
    var estRows=Math.ceil(wlWords.length/wlCols)
    var estWLH=estRows*(wlFS+wlPadY*2+4)+24
    // Auto-fit: prevent overflow
    if(cfg.autoFitWL!==false&&estWLH+gridH>availH&&wlFS>8){
      var ratio=(availH-gridH-24)/estRows-4
      wlFS=Math.max(8,Math.round(Math.min(wlFS,Math.max(8,ratio-wlPadY*2))))
    }
    // Auto-font-size: fill available space when there's room
    if(cfg.autoFontSize!==false&&estWLH+gridH<availH-10){
      var idealFS=Math.floor((availH-gridH-24)/estRows-wlPadY*2-4)
      wlFS=Math.min(cfg.wordFontSize||11,Math.max(wlFS,Math.min(idealFS,24)))
    }
    wlElem=React.createElement(WS.WordList,{words:wlWords,found:found,cols:wlCols,showFound:cfg.showFound,wordFontSize:wlFS,listHeaderSize:cfg.listHeaderSize||13,listIndent:sc(cfg.listIndent),listGap:sc(cfg.listGap),pillFill:cfg.pillFill,pillText:cfg.pillText,pillBorder:cfg.pillBorder,pillBorderColor:cfg.pillBorderColor,pillBorderW:cfg.pillBorderW,pillRadius:cfg.pillRadius,pillPadX:cfg.pillPadX,pillPadY:cfg.pillPadY})
  }
  // Calculate grid stats for info line
  var gridStats=''
  if(puzzle){
    var wc=Object.keys(puzzle.placements).length
    var totalCells=(puzzle.rows||15)*(puzzle.cols||15)
    var filledCells=0
    for(var ri=0;ri<(puzzle.rows||15);ri++){
      for(var ci=0;ci<(puzzle.cols||15);ci++){
        if(puzzle.grid[ri]&&puzzle.grid[ri][ci]&&puzzle.grid[ri][ci]!=='')filledCells++
      }
    }
    var fillPct=Math.round(filledCells/totalCells*100)
    gridStats=' | '+wc+' words | '+fillPct+'% fill'
  }
  var puzzleContent=puzzle?React.createElement('div',null,
    cfg.showInfo?React.createElement('div',{style:{fontSize:9,color:isDark?'rgba(255,255,255,0.4)':'#999',textAlign:'center',marginBottom:6}},
      trim.n+' | '+(trim.w/72).toFixed(1)+'x'+(trim.h/72).toFixed(1)+'"'+(cfg.bleed?'+bleed':'')+' | MG:'+(m.outer/72).toFixed(2)+'in'+gridStats
    ):null,
    React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}},
      window.isOrganicShape(cfg.shape||'rectangle')?
        React.createElement(WS.OrganicGrid,{grid:puzzle.grid,mask:puzzle.mask,placements:puzzle.placements,showSol:showSolP||cfg.showSolution,foundWords:found,hlColor:cfg.highlightColor,fontWeight:cfg.fontWeight,cellSize:cs,onMD:onMD,onME:onME,onMU:onMU,selCells:selC,gridLines:cfg.gridLines,solStyle:cfg.solStyle,cellBorders:cfg.cellBorders,gridFontSize:cfg.gridFontSize||Math.round(cs*0.45),shapeName:cfg.shape,outlineColor:cfg.outlineColor,outlineWidth:cfg.outlineWidth,themeBg:cfg.shapeBg||tmpl.bg}):
        React.createElement(WS.PuzzleGrid,{grid:puzzle.grid,mask:puzzle.mask,placements:puzzle.placements,showSol:showSolP||cfg.showSolution,foundWords:found,hlColor:cfg.highlightColor,fontWeight:cfg.fontWeight,cellSize:cs,onMD:onMD,onME:onME,onMU:onMU,selCells:selC,gridLines:cfg.gridLines,solStyle:cfg.solStyle,cellBorders:cfg.cellBorders,gridFontSize:cfg.gridFontSize||Math.round(cs*0.45)}),
      wlElem
    )
  ):React.createElement('div',{style:{padding:40,textAlign:'center',color:isDark?'rgba(255,255,255,0.5)':'#666'}},gen?'Generating...':'Click Generate')
  // Arrange title position
  var children=[cfg.bleed?React.createElement('div',{key:'bled',style:{position:'absolute',top:Math.round(9*scale),left:Math.round(9*scale),right:Math.round(9*scale),bottom:Math.round(9*scale),border:'1px solid '+mgColor,pointerEvents:'none',zIndex:1,opacity:0.4}}):null]
  children.push(React.createElement('div',{key:'mgn',style:{position:'absolute',top:mt,left:mo,right:mo,bottom:mb,border:'1px dashed '+(isDark?'rgba(255,255,255,0.25)':'rgba(200,0,0,0.2)'),pointerEvents:'none',zIndex:1}}))
  // Content div with padding matching margin positions (not just 16px!)
  var contentStyle={paddingTop:Math.max(mt+Math.round(14*scale),4)+'px',paddingBottom:Math.max(mb,4)+'px',paddingLeft:Math.max(mo,4)+'px',paddingRight:Math.max(mo,4)+'px',height:'100%',display:'flex',flexDirection:'column',boxSizing:'border-box'}
  if(titlePos===1){children.push(titleElem);children.push(React.createElement('div',{key:'cnt',style:contentStyle},puzzleContent))}
  else if(titlePos===-1){children.push(React.createElement('div',{key:'cnt',style:contentStyle},puzzleContent));children.push(titleElem)}
  else{
    contentStyle.justifyContent='center'
    children.push(React.createElement('div',{key:'cnt',style:contentStyle},titleElem,puzzleContent))
  }
  return React.createElement('div',{className:'pzc',style:{background:tmpl.bg,color:tmpl.tc,width:cardW,height:cardH,position:'relative',display:'flex',flexDirection:'column'}},children)
}

  return mask
}

function renderSmoothShape(name,rows,cols){
  var animal=window.ANIMAL_SVG_PATHS[name]
  if(!animal)return null
  var d=animal.d,w=animal.w||512,h=animal.h||512
  var ca=document.createElement('canvas')
  ca.width=cols;ca.height=rows
  var ctx=ca.getContext('2d')
  var path
  try{path=new Path2D(d)}catch(e){return null}
  var pad=0.1
  var scaleX=(1-pad*2)*cols/w
  var scaleY=(1-pad*2)*rows/h
  var s=Math.min(scaleX,scaleY)
  var offX=(cols-w*s)/2
  var offY=(rows-h*s)/2
  var mask=Array.from({length:rows},function(){return Array(cols).fill(false)})
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var sx=(c+0.5-offX)/s,sy=(r+0.5-offY)/s
    if(ctx.isPointInPath(path,sx,sy))mask[r][c]=true
    else{
      if(ctx.isPointInPath(path,(c-offX)/s,(r-offY)/s)||
         ctx.isPointInPath(path,(c+1-offX)/s,(r-offY)/s)||
         ctx.isPointInPath(path,(c-offX)/s,(r+1-offY)/s)||
         ctx.isPointInPath(path,(c+1-offX)/s,(r+1-offY)/s))mask[r][c]=true
    }
  }
  return mask
}

function renderPolygonShape(name,rows,cols){
  var pts=window.POLYGON_SHAPES[name]
  if(!pts)return null
  var n=pts.length
  var mask=Array.from({length:rows},function(){return Array(cols).fill(false)})
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var px=(c-cols/2+0.5)/(cols/2),py=(r-rows/2+0.5)/(rows/2)
    var inside=false
    for(var i=0,j=n-1;i<n;j=i++){
      if((pts[i].y>py)!==(pts[j].y>py)&&px<(pts[j].x-pts[i].x)*(py-pts[i].y)/(pts[j].y-pts[i].y)+pts[i].x)
        inside=!inside
    }
    mask[r][c]=inside
  }
  return mask
}

    doc.setFont('helvetica','bold');doc.setFontSize(Math.min(Math.max(cfg.titleFontSize||20,10),36))
    doc.setTextColor(tColor[0],tColor[1],tColor[2])
    var titleY=Math.max(Mtop+14+(cfg.titleGap||0),16)
    var titleX=W/2+(cfg.titleIndent||0)
    doc.text(cfg.title||'Word Search Puzzle',titleX,titleY,{align:'center'})
    
    var isSol=pz._mode==='solution'
    if(isSol){
      doc.setFontSize(10);doc.setTextColor(150,150,150)
      doc.text('- SOLUTION KEY -',W/2,Math.max(Mtop+30,50),{align:'center'})
    }
    
    // Grid size calculation (wordListH NOT subtracted — word list is BELOW grid)
    var titleH=isSol?32:22
    var maxW=Math.max(W-MX*2-2,100)
    var maxH=Math.max(H-Mtop-Mbot-titleH-6,100)
    var cs=Math.floor(Math.min(maxW/C,maxH/R))
    cs=Math.max(8,Math.min(cs,50))
    var gw=C*cs,gh=R*cs,gx=Math.floor((W-gw)/2),gy=Math.floor(Math.max(Mtop+titleH-5+(cfg.titleGap||0),36))
    
    // Grid background
    doc.setFillColor(isLight?248:25,isLight?248:25,isLight?250:25)
    doc.rect(gx-2,gy-2,gw+4,gh+4,'F')
    
    // Cell borders (when cellBorders OR gridLines is on — matches preview behavior)
    if(cfg.cellBorders||cfg.gridLines){
      doc.setDrawColor(isLight?220:60,isLight?220:60,isLight?220:60)
      doc.setLineWidth(0.4)
      for(var iC=0;iC<C;iC++)for(var iD=0;iD<R;iD++)
        doc.rect(gx+iC*cs,gy+iD*cs,cs,cs,'S')
    }
    
    // Grid lines (PDF-only, when gridLines is on)
    if(cfg.gridLines){
      doc.setDrawColor(isLight?200:60,isLight?200:60,isLight?200:60)
      doc.setLineWidth(0.3)
      for(var iA=0;iA<=C;iA++)doc.line(gx+iA*cs,gy,gx+iA*cs,gy+gh)
      for(var iB=0;iB<=R;iB++)doc.line(gx,gy+iB*cs,gx+gw,gy+iB*cs)
    }
    
    // Letters
    var solCells=isSol?pz._solCells||new Set():new Set()
    // Grid font size (use user setting or calculate from cell size)
    var fontSize=cfg.gridFontSize?Math.round(cfg.gridFontSize*0.85):Math.round(cs*0.55)
    fontSize=Math.max(5,Math.min(fontSize,30))
    doc.setFontSize(fontSize)
    
    for(var r=0;r<R;r++)for(var c=0;c<C;c++){
      var cellX=gx+c*cs+cs/2,cellY=gy+r*cs+cs*0.62
      var maskVal=pz.mask&&pz.mask[r]?pz.mask[r][c]:false
      if(!maskVal){
        doc.setFillColor(isLight?235:35,isLight?235:35,isLight?238:40)
        doc.rect(gx+c*cs,gy+r*cs,cs,cs,'F')
        continue
      }
      var ch=grid[r][c]||''
      if(!ch)continue
      
      if(isSol&&solCells.has(r+'-'+c)){
        if(solStyle==='highlight'||!solStyle){doc.setTextColor(hlR,hlG,hlB);doc.setFont('helvetica','bold')}
        else if(solStyle==='dim'){doc.setTextColor(tColor[0],tColor[1],tColor[2]);doc.setFont('helvetica','normal')}
        else{doc.setTextColor(tColor[0],tColor[1],tColor[2]);doc.setFont('helvetica','normal')}
      }else if(isSol&&solStyle==='dim'){
        doc.setTextColor(isLight?180:100,isLight?180:100,isLight?180:100)
        doc.setFont('helvetica','normal')
      }else{
        doc.setTextColor(tColor[0],tColor[1],tColor[2])
        doc.setFont('helvetica','normal')
      }
      doc.text(ch,cellX,cellY,{align:'center'})
    }
    
    // Word list (stay inside margins)
    var words=Object.keys(pz.placements||{}).sort()
    if(cfg.showWordList!==false&&words.length>0&&!isSol){
      var listY=gy+gh+6+(cfg.listGap||0)
      var maxListH=H-Mbot-25-listY
      if(maxListH>15){
        doc.setFontSize(9);doc.setTextColor(wColor[0],wColor[1],wColor[2])
        var headerFs=Math.min(Math.max(cfg.listHeaderSize||13,8),20)
        doc.setFontSize(headerFs)
        doc.setFont('helvetica','bold')
        var titleW=doc.getTextWidth('Words to Find')
        if(titleW>W-MX*2-10){doc.setFontSize(Math.max(headerFs-3,7))}
        doc.text('Words to Find',W/2+(cfg.listIndent||0),listY,{align:'center'})
        
        var wordFs=Math.max(6,Math.min(14,Math.round((cfg.wordFontSize||11)*0.75)))
        var bh=wordFs+5
        var bxStart=MX+3,bx=bxStart,by=listY+bh+3
        for(var wi=0;wi<words.length&&by<H-Mbot-bh-3;wi++){
          var bw=Math.round(doc.getTextWidth(words[wi])+10)
          if(bx+bw>W-MX-3){bx=bxStart;by+=bh+2}
          if(by+bh>H-Mbot-3)break
          doc.setFillColor(isLight?243:50,isLight?244:50,isLight?246:55)
          doc.setDrawColor(isLight?190:70,isLight?190:70,isLight?190:70)
          try{doc.roundedRect(bx,by,bw,bh,2,2,'FD')}catch(e){doc.rect(bx,by,bw,bh,'F');doc.rect(bx,by,bw,bh,'S')}
          doc.setTextColor(isLight?55:220,isLight?65:220,isLight?81:220)
          doc.setFont('helvetica','normal');doc.setFontSize(wordFs)
          doc.text(words[wi],bx+bw/2,by+bh-2,{align:'center'})
          bx+=bw+2
        }
      }
    }
    
    // Page number
    if(cfg.showPageNum!==false){
      doc.setFontSize(8);doc.setTextColor(pColor[0],pColor[1],pColor[2])
      doc.text((isSol?'Solution ':'')+'Page '+(pageCount+(cfg.startPage||1)),W/2,Math.min(H-Mbot-2,H-15),{align:'center'})
    }
    
    if(onProg)onProg(pageCount+1,puzzlePages.length,'Page '+(pageCount+1)+'/'+puzzlePages.length)
    pageCount++
  }
  
  // Save if at least 1 page was generated
  if(pageCount>0){
    doc.save((cfg.exportName||cfg.title||'word-search').replace(/[^a-zA-Z0-9_-]/g,'_')+'.pdf')
    return true
  }
  return false
}}
</script>

<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React
const WS=window.WS={}

// ========== BASE COMPONENTS ==========
WS.Toggle=({l,checked,fn,sub})=>(
  <div className="tog-r">
    <div><span className="tog-l">{l}</span>{sub&&<div style={{fontSize:8,color:'var(--t3)',marginTop:1}}>{sub}</div>}</div>
    <label className="tog-s"><input type="checkbox" checked={checked} onChange={e=>fn(e.target.checked)}/><span className="tog-sl"/></label>
  </div>
)

WS.Section=({t,ic,ch,def=true,bdg})=>{const[o,so]=useState(def);return(
  <div className="sec"><div className="sec-hd" onClick={()=>so(!o)}><span className="sec-ttl"><span className="sec-ico">{ic}</span>{t}{bdg&&<span className="sec-bdg">{bdg}</span>}</span><span className={`sec-ch ${o?'':'shut'}`}>▼</span></div>{o?<div className="sec-bd">{ch}</div>:<div className="sec-bd shut"/>}</div>
)}

WS.Slider=({l,v,mn,mx,st=1,on,un=''})=>(
  <div className="slw"><div className="slh"><span className="lbl">{l}</span><span className="slv">{v}{un}</span></div><input type="range" min={mn} max={mx} step={st} value={v} onChange={e=>on(Number(e.target.value))}/></div>
)

WS.Select=({l,v,opts,on})=>(
  <div style={{marginBottom:8}}>{l&&<span className="lbl">{l}</span>}<select className="sel" value={v} onChange={e=>on(e.target.value)}>{opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}</select></div>
)

WS.Toast=({msg,type,close})=>{useEffect(()=>{const t=setTimeout(close,3000);return()=>clearTimeout(t)},[close]);return<div className={`toast ${type}`}>{msg}</div>}

WS.Progress=({done,total,label})=>{const p=total>0?Math.round(done/total*100):0;return(
  <div className="prog"><div className="prog-b"><div className="prog-f" style={{width:p+'%'}}/></div><div className="prog-t">{label||`${done}/${total}`}</div></div>
)}

// ========== PUZZLE GRID ==========
WS.PuzzleGrid=({grid,mask,placements,showSol,foundWords,hlColor,fontWeight,cellSize,onMD,onME,onMU,selCells,gridLines,solStyle,cellBorders,gridFontSize})=>{
  const cs=cellSize||24,R=grid.length,C=grid[0].length
  const gfs=gridFontSize||cs*0.45
  const solSet=useMemo(()=>{if(!showSol)return new Set();const s=new Set();Object.values(placements||{}).forEach(cells=>cells.forEach(([r,c])=>s.add(r+'-'+c)));return s},[showSol,placements])
  const COLORS=['#6c63ff','#22c55e','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6','#8b5cf6','#06b6d4']
  const solLines=useMemo(()=>{
    if(!showSol||solStyle!=='lines'||!placements)return[]
    const out=[];let ci=0
    Object.entries(placements).forEach(([w,cells])=>{
      if(cells.length<2)return
      const[r1,c1]=cells[0],[r2,c2]=cells[cells.length-1]
      out.push({x1:c1*cs+cs/2,y1:r1*cs+cs/2,x2:c2*cs+cs/2,y2:r2*cs+cs/2,color:COLORS[ci%COLORS.length]})
      ci++
    })
    return out
  },[showSol,solStyle,placements,cs])
  return(
    <div className="gw">
      <div className="gg" style={{gridTemplateColumns:'repeat('+C+','+cs+'px)',gridTemplateRows:'repeat('+R+','+cs+'px)',width:C*cs,height:R*cs}} onMouseUp={onMU} onMouseLeave={onMU}>
        <svg className="gsvg" width={C*cs} height={R*cs}>
          {selCells.length>1&&<line x1={selCells[0][1]*cs+cs/2} y1={selCells[0][0]*cs+cs/2} x2={selCells[selCells.length-1][1]*cs+cs/2} y2={selCells[selCells.length-1][0]*cs+cs/2} stroke={hlColor||'#6c63ff'} strokeWidth={cs*0.6} strokeLinecap="round" opacity={0.45}/>}
          {solLines.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={cs*0.5} strokeLinecap="round" opacity={0.3}/>)}
        </svg>
        {grid.map((row,ri)=>row.map((cell,ci)=>{
          if(!mask[ri][ci])return<div key={ri+'-'+ci} style={{width:cs,height:cs,background:'#f5f5f5'}}/>
          const isSel=selCells.some(([r,c])=>r===ri&&c===ci),isSol=solSet.has(ri+'-'+ci)
          let bg='transparent',color='#1a1a2e',extraStyle={}
          if(isSel){bg=(hlColor||'#6c63ff')+'44'}
          if(showSol){
            if(isSol){
              if(solStyle==='highlight'||!solStyle){color=hlColor||'#6c63ff'}
              else if(solStyle==='dim'){}
              else if(solStyle==='circle'){extraStyle={borderRadius:'50%',background:(hlColor||'#6c63ff')+'22'}}
              else if(solStyle==='black_circle'){extraStyle={borderRadius:'50%',background:'rgba(0,0,0,0.12)'}}
              else if(solStyle==='square'){extraStyle={boxShadow:'inset 0 0 0 2px '+(hlColor||'#6c63ff')}}
              else if(solStyle==='black_square'){extraStyle={boxShadow:'inset 0 0 0 2px rgba(0,0,0,0.3)'}}
              else if(solStyle==='outline'){extraStyle={border:'2px solid '+(hlColor||'#6c63ff'),borderRadius:3}}
            }else if(solStyle==='dim'){color='#ccc'}
          }
          if(cellBorders||gridLines){extraStyle={...extraStyle,border:'1px solid #e5e7eb'}}
          return<div key={ri+'-'+ci} className="gc" style={{width:cs,height:cs,fontSize:gfs,fontWeight:fontWeight||700,background:bg,color,...extraStyle}} onMouseDown={()=>onMD&&onMD(ri,ci)} onMouseEnter={()=>onME&&onME(ri,ci)}>{cell}</div>
        }))}
      </div>
    </div>
)}

// Canvas-based organic shape grid
WS.OrganicGrid=({grid,mask,placements,showSol,foundWords,hlColor,fontWeight,cellSize,onMD,onME,onMU,selCells,gridLines,solStyle,cellBorders,gridFontSize,shapeName,outlineColor,outlineWidth,themeBg})=>{
  const cs=cellSize||24,R=grid.length,C=grid[0].length
  const gfs=gridFontSize||Math.round(cs*0.45)
  const solSet=useMemo(()=>{if(!showSol)return new Set();const s=new Set();Object.values(placements||{}).forEach(cells=>cells.forEach(([r,c])=>s.add(r+'-'+c)));return s},[showSol,placements])
  const animalInfo=useMemo(()=>{
    const a=window.ANIMAL_SVG_PATHS?.[shapeName]
    if(!a)return null
    try{return{path:new Path2D(a.d),w:a.w||512,h:a.h||512}}catch(e){return null}
  },[shapeName])
  const canvasRef=useRef(null)
  const [selStart,setSelStart]=useState(null)

  useEffect(()=>{
    const ca=canvasRef.current
    if(!ca||!animalInfo)return
    const dpr=window.devicePixelRatio||1
    const w=C*cs,h=R*cs
    ca.width=w*dpr;ca.height=h*dpr;ca.style.width=w+'px';ca.style.height=h+'px'
    const ctx=ca.getContext('2d')
    ctx.scale(dpr,dpr)
    ctx.clearRect(0,0,w,h)

    // Calculate transform to map SVG path coords to pixel coords (with padding)
    const pad=0.08
    const scaleX=(1-pad*2)*w/animalInfo.w
    const scaleY=(1-pad*2)*h/animalInfo.h
    const s=Math.min(scaleX,scaleY)
    const offX=(w-animalInfo.w*s)/2
    const offY=(h-animalInfo.h*s)/2

    // Draw shape fill
    ctx.save()
    ctx.translate(offX,offY)
    ctx.scale(s,s)
    ctx.fillStyle=themeBg||'#ffffff'
    ctx.fill(animalInfo.path)
    ctx.restore()

    // Draw letters — skip cells outside the path via isPointInPath
    ctx.textAlign='center';ctx.textBaseline='middle'
    for(let r=0;r<R;r++)for(let c=0;c<C;c++){
      const cell=grid[r]?.[c]
      if(!cell)continue
      // Check cell center against SVG path
      const px=c*cs+cs/2,py=r*cs+cs/2
      const svgX=(px-offX)/s,svgY=(py-offY)/s
      if(!ctx.isPointInPath(animalInfo.path,svgX,svgY))continue

      const isSel=selCells?.some(([rr,cc])=>rr===r&&cc===c)
      const isSol=solSet.has(r+'-'+c)

      if(isSel){
        ctx.fillStyle=(hlColor||'#6c63ff')+'66'
        ctx.fillRect(c*cs,r*cs,cs,cs)
      }else if(showSol&&isSol&&solStyle==='highlight'){
        ctx.fillStyle=(hlColor||'#6c63ff')+'33'
        ctx.fillRect(c*cs,r*cs,cs,cs)
      }

      let color='#1a1a2e'
      if(isSol&&showSol){
        if(solStyle==='highlight'||!solStyle)color=hlColor||'#6c63ff'
        else if(solStyle==='dim'){if(!isSel)color='#ccc'}
      }else if(showSol&&solStyle==='dim')color='#ccc'

      ctx.fillStyle=color
      ctx.font=(fontWeight||700)+' '+gfs+'px sans-serif'
      ctx.fillText(cell,px,py+1)
    }

    // Draw outline (on separate pass, unclipped)
    if(outlineColor&&outlineColor!=='none'){
      ctx.save()
      ctx.translate(offX,offY)
      ctx.scale(s,s)
      ctx.strokeStyle=outlineColor
      ctx.lineWidth=(outlineWidth||2)/s
      ctx.stroke(animalInfo.path)
      ctx.restore()
    }
  },[grid,mask,animalInfo,cs,gfs,fontWeight,showSol,solStyle,hlColor,selCells,solSet,outlineColor,outlineWidth,themeBg])

  const getCell=function(e){
    const rect=canvasRef.current.getBoundingClientRect()
    const x=e.clientX-rect.left,y=e.clientY-rect.top
    return[Math.floor(y/cs),Math.floor(x/cs)]
  }

  return React.createElement('canvas',{
    ref:canvasRef,
    width:C*cs,height:R*cs,
    style:{width:C*cs,height:R*cs,cursor:'pointer',display:'block',borderRadius:4},
    onMouseDown:function(e){
      const[r,c]=getCell(e)
      onMD&&onMD(r,c)
      setSelStart([r,c])
    },
    onMouseMove:function(e){
      if(!selStart)return
      const[r,c]=getCell(e)
      onME&&onME(r,c)
    },
    onMouseUp:function(e){
      setSelStart(null)
      onMU&&onMU(e)
    }
  })
}

WS.WordList=({words,found,cols,showFound,wordFontSize,listHeaderSize,listIndent,listGap,pillFill,pillText,pillBorder,pillBorderColor,pillBorderW,pillRadius,pillPadX,pillPadY})=>(
  <div className="wls" style={{marginTop:(listGap||0)}}><div className="wlt" style={{fontSize:listHeaderSize||12,fontWeight:700,marginLeft:(listIndent||0)}}>Words to Find:<span className="wlb" style={{fontSize:Math.max(9,(listHeaderSize||12)-3),marginLeft:6}}>{words.length}</span></div>
    <div className="wlg" style={{gridTemplateColumns:'repeat('+((cols||4)||4)+', 1fr)',gap:4}}>{words.map(w=><span key={w} className={'wp '+(found?.includes(w)?'fnd':'')} style={{fontSize:wordFontSize||11,background:pillFill||'#f3f4f6',color:pillText||'#1f2937',borderRadius:(pillRadius||6)+'px',padding:(pillPadY||4)+'px '+(pillPadX||8)+'px',border:pillBorder?(pillBorderW||1)+'px solid '+(pillBorderColor||'#d1d5db'):'none'}}>{w}</span>)}</div>
    {showFound!==false&&<div className="fm" style={{fontSize:Math.max(10,wordFontSize||11)}}>Found {found?.length||0} of {words.length}</div>}</div>
)

// ========== SIDEBAR ==========
function Sidebar({cfg,setCfg,wordText,setWordText,onGen,onBulk,gen,prog,isKing,onCode}){
  const set=(k,v)=>setCfg(p=>({...p,[k]:v}))
  const[lic,setLic]=useState('')
  const[tab,setTab]=useState('settings')
  const stats=useMemo(()=>{const w=wordText.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length>=2)
  const u=[...new Set(w.map(w=>w.toUpperCase()))]
  const lens=w.map(w=>w.length)
  return{total:w.length,uniq:u.length,short:lens.length?Math.min(...lens):0,long:lens.length?Math.max(...lens):0,ave:lens.length?Math.round(lens.reduce((a,b)=>a+b,0)/lens.length):0}},[wordText])
  const ntmpl=Object.keys(window.TEMPLATES).length,hcols=window.HCOLORS.length,shapes=window.SHAPES.length
  return(
    <aside className="sb">
      <div className="sb-hd"><div className="sb-logo">🔍</div><div className="sb-brand"><h1>MXD Supreme Pro</h1><span>KDP Publishing Suite</span></div></div>
      <div className="tab-g" style={{padding:'6px 8px 0',gap:3,display:'flex'}}>
        <button className={'tab'+(tab==='settings'?' on':'')} onClick={()=>setTab('settings')}>⚙️ Settings</button>
        <button className={'tab'+(tab==='kdp'?' on':'')} onClick={()=>setTab('kdp')}>[K] KDP</button>
        <button className={'tab'+(tab==='bulk'?' on':'')} onClick={()=>setTab('bulk')}>[B] Bulk</button>
        <button className={'tab'+(tab==='export'?' on':'')} onClick={()=>setTab('export')}>[>] Export</button>
      </div>
      <div className="sb-body">
        {tab==='settings'&&<>
          <WS.Section t="License" ic={isKing?'👑':'🔑'} ch={!isKing?<div className="row"><input className="txt-in" placeholder="Code..." value={lic} onChange={e=>setLic(e.target.value)}/><button className="btn btn-ok" onClick={()=>onCode(lic)}>Go</button></div>:<div className="king-b">👑 KING MODE ACTIVE</div>}/>
          <WS.Section t="UI Theme" ic="[T]" bdg={Object.keys(window.THEMES).length+''} ch={<div className="chips">{Object.entries(window.THEMES).map(([k,t])=><button key={k} className={'chip '+(cfg.uiTheme===k?'on':'')} onClick={()=>set('uiTheme',k)}><span className="chip-dot" style={{background:t.c||'#888'}}/>{t.n}</button>)}</div>}/>
          <WS.Section t="Grid Size" ic="[G]" bdg={cfg.rows+'×'+cfg.cols} def={true} ch={<>
            <div className="sm">{window.SIZE_MODES.map(m=><div key={m.id} className={'sm-it '+(cfg.sizeMode===m.id?'on':'')} onClick={()=>{set('sizeMode',m.id);set('rows',m.r);set('cols',m.c)}}><div className="sm-n">{m.n}</div><div className="sm-d">{m.d}</div></div>)}</div>
            <div className="row"><WS.Select l="Width" v={cfg.cols} opts={Array.from({length:36},(_,i)=>({v:i+5,l:i+5+''}))} on={v=>{set('cols',v);set('sizeMode','custom')}}/><WS.Select l="Height" v={cfg.rows} opts={Array.from({length:36},(_,i)=>({v:i+5,l:i+5+''}))} on={v=>{set('rows',v);set('sizeMode','custom')}}/></div>
            <WS.Slider l="Cell Size" v={cfg.cellSize} mn={14} mx={48} on={v=>set('cellSize',v)} un="px"/>
            <WS.Toggle l="Auto Cell Size" checked={cfg.autoCellSize} fn={v=>set('autoCellSize',v)} sub="Auto-fit cells inside shape"/>
          </>}/>
          <WS.Section t="Words" ic="[W]" bdg={stats.total+''} ch={<>
            <textarea className="wta" value={wordText} onChange={e=>setWordText(e.target.value)} placeholder="DRAGON&#10;FIRE&#10;WINGS"/>
            <div className="wcnt"><span><strong>{stats.total}</strong> words</span><span><strong>{stats.uniq}</strong> unique</span><span>Short: {stats.short||'-'} Long: {stats.long||'-'}</span></div>
            <div style={{display:'flex',gap:3,marginBottom:6}}>
              <button className="btn btn-sec btn-sm" onClick={()=>{const w=wordText.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length);setWordText(w.sort().join('\n'))}}>A-Z</button>
              <button className="btn btn-sec btn-sm" onClick={()=>{const w=wordText.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length);setWordText(w.sort().reverse().join('\n'))}}>Z-A</button>
              <button className="btn btn-sec btn-sm" onClick={()=>{const w=wordText.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length);setWordText(w.sort((a,b)=>a.length-b.length).join('\n'))}}>S-L</button>
              <button className="btn btn-sec btn-sm" onClick={()=>{const w=wordText.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length);setWordText(w.sort(()=>Math.random()-0.5).join('\n'))}}>[#]</button>
              <button className="btn btn-sec btn-sm" onClick={()=>setWordText('')}>[X]</button>
            </div>
            <WS.Slider l="Max Words" v={cfg.wordsPerGrid} mn={3} mx={100} on={v=>set('wordsPerGrid',v)}/>

            <WS.Select l="Trim Size" v={cfg.trimSize||'letter'} opts={window.TRIM_SIZES.map(function(t){return{v:t.id,l:t.n+' ('+t.w+'x'+t.h+')'}})} on={function(v){set('trimSize',v)}}/>
            <div className="row"><WS.Select l="Margins" v={cfg.marginPreset||'standard'} opts={window.MARGIN_PRESETS.map(function(m){return{v:m.id,l:m.n}})} on={function(v){set('marginPreset',v)}}/><WS.Select l="Template" v={cfg.template} opts={Object.entries(window.TEMPLATES).map(function(e){return{v:e[0],l:e[1].n}})} on={function(v){set('template',v)}}/></div>
            <WS.Toggle l="Add Bleed (0.125in)" checked={cfg.bleed} fn={function(v){set('bleed',v)}} sub={cfg.bleed?'Required for edge-to-edge printing':'Safe for no-bleed interiors'}/>
            <div className="div"/>
            <WS.Toggle l="Show Solutions" checked={cfg.showSolution} fn={function(v){set('showSolution',v)}}/>
            <WS.Toggle l="Show Page Numbers" checked={cfg.showPageNum} fn={function(v){set('showPageNum',v)}}/>
            <WS.Toggle l="Cover Page" checked={cfg.includeCover} fn={function(v){set('includeCover',v)}}/>
            <WS.Toggle l="Table of Contents" checked={cfg.includeTOC} fn={function(v){set('includeTOC',v)}}/>
            <div className="div"/><WS.Toggle l="Bulk Mode" checked={cfg.bulkMode} fn={function(v){set('bulkMode',v)}} sub={cfg.bulkMode?'Generates '+cfg.bulkPageCount+' puzzles':''}/>
            {cfg.bulkMode&&<>
              <WS.Slider l="Pages" v={cfg.bulkPageCount} mn={1} mx={500} on={function(v){set('bulkPageCount',v)}}/>
              <WS.Toggle l="Shuffle Pages" checked={cfg.shufflePages} fn={function(v){set('shufflePages',v)}}/>
              <WS.Slider l="Start Page #" v={cfg.startPage||1} mn={1} mx={999} on={function(v){set('startPage',v)}}/>
            </>}
            <div style={{display:'flex',gap:4,marginTop:6}}>
              <button className="btn btn-ok btn-full" onClick={function(){
                // Set format to PNG temporarily for this export
                var oldFmt=cfg.imageFormat
                set('imageFormat','png')
                setTimeout(function(){onBulk()},50)
              }} disabled={gen}>{gen?'...':'PNG'}</button>
              <button className="btn btn-pri btn-full" onClick={function(){
                // Set format to JPEG temporarily for this export
                var oldFmt=cfg.imageFormat
                set('imageFormat','jpeg')
                setTimeout(function(){onBulk()},50)
              }} disabled={gen}>{gen?'...':'JPEG'}</button>
            </div>
          </>}/>
        </>}

        {/* KDP Margin Validator */}
        <div className="kdp-card" style={{marginTop:5}}>
          <h4 style={{fontSize:9}}>KDP Margin Validator</h4>
          <div className="qs-s">
            {function(){
              var t=(window.TRIM_SIZES||[]).find(function(t){return t.id===(cfg.trimSize||'letter')})||{n:'Letter',w:612,h:792}
              var m=(window.MARGIN_PRESETS||[]).find(function(p){return p.id===(cfg.marginPreset||'standard')})||{top:36,bottom:36,inner:45,outer:36}
              var kdp=m.kdp_min||{top:18,bottom:18,inner:27,outer:18}
              var items=[
                {l:'Trim Size',v:t.n||'Letter',o:''},
                {l:'Page',v:t.w+'\u00D7'+t.h+'pt ('+(t.w/72).toFixed(1)+'\u2033\u00D7'+(t.h/72).toFixed(1)+'\u2033)',o:''},
                {l:'Top Margin',v:(m.top/72).toFixed(3)+'\u2033',o:'Min '+(kdp.top/72).toFixed(3)+'\u2033 '+(m.top>=kdp.top?'[OK]':'[LOW]'),c:m.top>=kdp.top?'var(--ok)':'var(--err)'},
                {l:'Bottom Margin',v:(m.bottom/72).toFixed(3)+'\u2033',o:'Min '+(kdp.bottom/72).toFixed(3)+'\u2033 '+(m.bottom>=kdp.bottom?'[OK]':'[LOW]'),c:m.bottom>=kdp.bottom?'var(--ok)':'var(--err)'},
                {l:'Outer Margin',v:(m.outer/72).toFixed(3)+'\u2033',o:'Min '+(kdp.outer/72).toFixed(3)+'\u2033 '+(m.outer>=kdp.outer?'[OK]':'[LOW]'),c:m.outer>=kdp.outer?'var(--ok)':'var(--err)'},
                {l:'Inner (Gutter)',v:(m.inner/72).toFixed(3)+'\u2033',o:'Min '+(kdp.inner/72).toFixed(3)+'\u2033 '+(m.inner>=kdp.inner?'[OK]':'[LOW]'),c:m.inner>=kdp.inner?'var(--ok)':'var(--err)'},
                {l:'Bleed',v:cfg.bleed?'0.125\u2033 INCLUDED':'None',o:cfg.bleed?'[OK]':'[OK]',c:cfg.bleed?'var(--ok)':'var(--t2)'}
              ]
              var allOk=items.filter(function(i){return i.l!=='Trim Size'&&i.l!=='Page'}).every(function(i){return i.o.indexOf('[LOW]')<0})
              return[<div key="stat" className="qs-it"><span className="qs-l">Status</span><span className="qs-v" style={{color:allOk?'var(--ok)':'var(--err)'}}>{allOk?'KDP COMPLIANT':'MARGINS TOO LOW'}</span></div>].concat(items.map(function(i,idx){return<div key={idx} className="qs-it"><span className="qs-l">{i.l}</span><span style={{color:i.c||'var(--hl)',fontWeight:700,fontSize:10}}>{i.v}</span><span style={{fontSize:8,color:'var(--t3)'}}>{i.o}</span></div>}))
            }()}
          </div>
        </div>
      </div>

      <div className="sb-foot">
        {gen&&prog&&<WS.Progress done={prog.done} total={prog.total} label={prog.label}/>}
        <button className="btn btn-pri btn-full" onClick={onGen} disabled={gen}>
          {gen?'⏳ Generating...':'⚡ Generate Puzzle'}
        </button>
      </div>
    </aside>
)}

// ========== SETTINGS VALIDATION ==========
window.CFG_DEFAULTS={rows:15,cols:15,sizeMode:'medium',shape:'none',letterCase:'upper',fontWeight:'700',fontFamily:'Inter,sans-serif',wordsPerGrid:15,wordColumns:4,cellSize:24,title:'WORD SEARCH PUZZLE',highlightColor:'#6c63ff',template:'classic',bulkMode:false,bulkPageCount:10,showWordList:true,showSolution:false,showPageNum:true,solStyle:'highlight',allowH:true,allowV:true,allowDiag:true,allowReverse:true,gridLines:false,cellBorders:false,includeCover:false,includeTOC:false,shufflePages:false,startPage:1,bleed:false,trimSize:'letter',marginPreset:'standard',customMarginTop:28,customMarginBottom:28,customMarginInner:36,customMarginOuter:28,showFound:true,showInfo:true,autoCellSize:false,titlePos:1,wordFontSize:11,gridFontSize:24,listHeaderSize:13,titleFontSize:20,titleIndent:0,titleGap:0,listIndent:0,listGap:0,dpi:300,imageFormat:'png',jpegQuality:0.95,uiTheme:'night',pageSize:'letter',mkt:'us',exportName:'',pillFill:'#f3f4f6',pillText:'#1f2937',pillBorder:false,pillBorderColor:'#d1d5db',pillBorderW:1,pillRadius:6,pillPadX:8,pillPadY:4,autoFitWL:true,wordSort:'alpha',autoFontSize:true,outlineColor:'#333',outlineWidth:2,shapeBg:''}
// Clamp number to valid range, return default on NaN
window.clamp=function(v,mn,mx,def){if(v===null||v===undefined||isNaN(v))return def||mn;return Math.max(mn||0,Math.min(mx!==undefined?mx:999999,v))}
// Merge cfg with defaults, fixing missing/invalid keys
window.getCfg=function(cfg){
  if(!cfg||typeof cfg!=='object')return JSON.parse(JSON.stringify(window.CFG_DEFAULTS))
  var r={}
  for(var k in window.CFG_DEFAULTS){
    if(k in cfg){
      var v=cfg[k]
      // Type conversion safety
      if(typeof window.CFG_DEFAULTS[k]==='number'){
        v=window.clamp(parseFloat(v),0,9999,window.CFG_DEFAULTS[k])
      }else if(typeof window.CFG_DEFAULTS[k]==='boolean'){
        v=v===true||v==='true'?true:false
      }
      r[k]=v
    }else{
      r[k]=window.CFG_DEFAULTS[k]
    }
  }
  return r
}

// ========== APP ==========
function App(){
  const[cfg,setCfg]=useState(()=>{
    const saved=localStorage.getItem('mxd_cfg')
    return saved?window.getCfg(JSON.parse(saved)):{
      rows:15,cols:15,sizeMode:'medium',shape:'none',letterCase:'upper',fontWeight:'700',fontFamily:'Inter,sans-serif',
      wordsPerGrid:15,wordColumns:4,cellSize:24,title:'WORD SEARCH PUZZLE',
      highlightColor:'#6c63ff',template:'classic',bulkMode:false,bulkPageCount:10,
      showWordList:true,showSolution:false,showPageNum:true,solStyle:'highlight',
      allowH:true,allowV:true,allowDiag:true,allowReverse:true,
      gridLines:false,cellBorders:false,includeCover:false,includeTOC:false,shufflePages:false,startPage:1,bleed:false,trimSize:'letter',marginPreset:'standard',customMarginTop:36,customMarginBottom:36,customMarginInner:45,customMarginOuter:36,showFound:true,showInfo:true,autoCellSize:false,titlePos:1,wordFontSize:11,gridFontSize:24,listHeaderSize:13,titleFontSize:20,titleIndent:0,titleGap:0,listIndent:0,listGap:0,dpi:300,imageFormat:'png',jpegQuality:0.95,
      uiTheme:'night',pageSize:'letter',mkt:'us',exportName:'',
      pillFill:'#f3f4f6',pillText:'#1f2937',pillBorder:false,pillBorderColor:'#d1d5db',pillBorderW:1,pillRadius:6,pillPadX:8,pillPadY:4,autoFitWL:true,wordSort:'alpha',autoFontSize:true,
      outlineColor:'#333',outlineWidth:2,shapeBg:''
    }
  })
  const[wordText,setWordText]=useState(window.AI_THEMES.Dragon.join('\n'))
  const[puzzle,setPuzzle]=useState(null)
  const[found,setFound]=useState([])
  const[sel,setSel]=useState(false)
  const[selS,setSelS]=useState(null)
  const[selC,setSelC]=useState([])
  const[toast,setToast]=useState(null)
  const[gen,setGen]=useState(false)
  const[prog,setProg]=useState(null)
  const[isKing,setIsKing]=useState(localStorage.getItem('mxd_king')==='true')
  const[vw,setVw]=useState('puzzle')

  const st=useCallback((m,t='info')=>setToast({m,t}),[])
  window.showToast=st

  const checkCode=useCallback(c=>{
    if(c.trim()==='kingofdragonsismxd'){setIsKing(true);localStorage.setItem('mxd_king','true');st('👑 KING MODE ACTIVATED!','ok');return true}
    st('Invalid code','err');return false
  },[st])

  const parseW=useCallback(t=>{
    const w=t.split(/[\n,]+/).map(w=>w.trim()).filter(w=>w.length>=2)
    return[...new Set(w)]
  },[])

  const getCB=useCallback((r1,c1,r2,c2)=>{
    const dr=r2-r1,dc=c2-c1,steps=Math.max(Math.abs(dr),Math.abs(dc))
    if(steps===0)return[[r1,c1]]
    if(dr!==0&&dc!==0&&Math.abs(dr)!==Math.abs(dc))return[]
    const sr=dr/steps,sc=dc/steps
    return Array.from({length:steps+1},(_,i)=>[Math.round(r1+sr*i),Math.round(c1+sc*i)])
  },[])

  const generate=useCallback(()=>{
    setGen(true);setProg({done:0,total:1,label:'Generating...'})
    setTimeout(()=>{
      try{
        const words=parseW(wordText).slice(0,cfg.wordsPerGrid)
        const res=window.WordSearchEngine.generate({...cfg,words})
        setPuzzle(res);setFound([]);setSelC([])
        const p=Object.keys(res.placements).length
        st('Generated '+p+' words','ok')
      }catch(e){st('Error: '+e.message,'err')}
      setProg(null);setGen(false)
    },50)
  },[cfg,wordText,parseW,st])

  const handleExport=useCallback(async()=>{
    if(!puzzle){st('Generate a puzzle first!','err');return}
    setGen(true);const t0=Date.now()
    var isPDF=!cfg.imageFormat||cfg.imageFormat==='png'?false:true
    var isPNG=!isPDF
    try{
      // Generate all puzzle data
      let pages=[]
      if(cfg.bulkMode){
        const total=cfg.bulkPageCount||10
        setProg({done:0,total,label:'Generating 0/'+total})
        const puzzles=[]
        for(let i=0;i<total;i++){
          const words=parseW(wordText).slice(0,cfg.wordsPerGrid)
          puzzles.push(window.WordSearchEngine.generate({...cfg,words}))
          var elapsed=Date.now()-t0,pct=(i+1)/total,eta=elapsed/pct*(1-pct)
          var etaStr=eta>0?' ETA:'+Math.round(eta/1000)+'s':''
          setProg({done:i+1,total,label:'Gen '+(i+1)+'/'+total+etaStr})
          if((i+1)%20===0)await new Promise(r=>setTimeout(r,0))
        }
        pages=puzzles
        if(cfg.shufflePages)pages.sort(()=>Math.random()-0.5)
      }else{
        pages=[puzzle]
      }
      
      // Add solution pages if enabled
      var solPages=[]
      if(cfg.showSolution){
        for(const p of pages){
          const sol=JSON.parse(JSON.stringify(p))
          sol._mode='solution'
          sol._solCells=new Set()
          Object.values(p.placements||{}).forEach(cells=>cells.forEach(([r,c])=>sol._solCells.add(r+'-'+c)))
          solPages.push(sol)
        }
      }
      
      // Capture all pages using html2canvas
      var allCanvases=[]
      var totalPages=pages.length+(cfg.showSolution?solPages.length:0)
      
      // Capture puzzle pages
      for(var ci=0;ci<pages.length;ci++){
        setPuzzle(pages[ci]);setVw('puzzle')
        await new Promise(r=>setTimeout(r,150)) // wait for React render
        var canvas=await window.CaptureExport.capture(cfg)
        allCanvases.push({canvas:canvas,mode:'puzzle',data:pages[ci]})
        setProg({done:ci+1,total:totalPages,label:'Capturing puzzle '+(ci+1)+'/'+pages.length})
      }
      
      // Capture solution pages
      if(cfg.showSolution){
        for(var si=0;si<solPages.length;si++){
          setPuzzle(solPages[si]);setVw('solution')
          await new Promise(r=>setTimeout(r,150))
          var solCanvas=await window.CaptureExport.capture(cfg)
          allCanvases.push({canvas:solCanvas,mode:'solution',data:solPages[si]})
          setProg({done:pages.length+si+1,total:totalPages,label:'Solution '+(si+1)+'/'+solPages.length})
        }
      }
      
      // Restore original puzzle
      setPuzzle(puzzle);setVw(vw)
      
      // Build output based on format
      if(isPNG){
        // Single PNG or ZIP
        if(allCanvases.length===1&&!cfg.bulkMode){
          var c=allCanvases[0].canvas
          if(c){
            var link=document.createElement('a')
            link.download=(cfg.exportName||cfg.title||'puzzle')+'.png'
            link.href=c.toDataURL('image/png')
            link.click()
          }
        }else if(typeof JSZip!=='undefined'){
          var zipP=new JSZip(),zipS=new JSZip()
          var startNum=cfg.startPage||1
          for(var zi=0;zi<allCanvases.length;zi++){
            var item=allCanvases[zi]
            if(item.canvas){
              var blob=await new Promise(function(res){item.canvas.toBlob(function(b){return res(b)},'image/png')})
              var fname=(startNum+zi)+'.png'
              if(item.mode==='solution')zipS.file(fname,blob)
              else zipP.file(fname,blob)
            }
          }
          var zipPBlob=await zipP.generateAsync({type:'blob'})
          var a1=document.createElement('a');a1.href=URL.createObjectURL(zipPBlob);a1.download='puzzles.zip';a1.click()
          if(cfg.showSolution){
            var zipSBlob=await zipS.generateAsync({type:'blob'})
            var a2=document.createElement('a');a2.href=URL.createObjectURL(zipSBlob);a2.download='solutions.zip';a2.click()
          }
        }else{st('JSZip needed for bulk PNG','err')}
      }else{
        // PDF output
        var{jsPDF}=window.jspdf
        var trim=(window.TRIM_SIZES||[]).find(function(t){return t.id===(cfg.trimSize||'letter')})||{w:612,h:792}
        var W=trim.w,H=trim.h
        var doc=new jsPDF({orientation:W>H?'landscape':'portrait',unit:'pt',format:[W,H]})
        
        // Cover page (capture or text)
        if(cfg.includeCover){
          doc.setFont('helvetica','bold');doc.setFontSize(36)
          doc.text(cfg.title||'Word Search Puzzle',W/2,H*0.4,{align:'center'})
          doc.setFontSize(14)
          doc.text('Word Search Puzzle Book',W/2,H*0.47,{align:'center'})
          doc.setFontSize(10)
          doc.text('Over '+(pages.length||1)+' Puzzles',W/2,H*0.53,{align:'center'})
        }
        
        // TOC
        if(cfg.includeTOC){
          if(cfg.includeCover)doc.addPage([W,H]);else if(allCanvases.length>0){}
          doc.setFont('helvetica','bold');doc.setFontSize(24)
          doc.text('Table of Contents',W/2,40,{align:'center'})
          doc.setFontSize(11)
          for(var ti=0;ti<Math.min(pages.length,50);ti++){
            var ty=70+ti*12
            if(ty>H-20)break
            doc.text('Puzzle '+(ti+1),30,ty)
            doc.text('Page '+(ti+1),W-30,ty,{align:'right'})
          }
        }
        
        // Add all captured pages
        var startOffset=(cfg.includeCover?1:0)+(cfg.includeTOC?1:0)
        for(var ai=0;ai<allCanvases.length;ai++){
          if(ai>0||startOffset>0)doc.addPage([W,H])
          var item2=allCanvases[ai]
          if(item2.canvas){
            try{doc.addImage(item2.canvas,'PNG',0,0,W,H)}catch(e){}
          }
          // Page number
          if(cfg.showPageNum!==false){
            doc.setFontSize(8);doc.setTextColor(150,150,150)
            doc.text((item2.mode==='solution'?'Solution ':'')+'Page '+(ai+startOffset+1),W/2,H-10,{align:'center'})
          }
          setProg({done:ai+1,total:allCanvases.length,label:'PDF page '+(ai+1)+'/'+allCanvases.length})
        }
        
        doc.save((cfg.exportName||cfg.title||'word-search').replace(/[^a-zA-Z0-9_-]/g,'_')+'.pdf')
      }
      
      var sec=Math.round((Date.now()-t0)/1000)
      st('Exported! ('+sec+'s)','ok')
    }catch(e){console.error('Export Error:',e);st('Export error: '+e.message,'err')}
    setProg(null);setGen(false)
  },[puzzle,cfg,wordText,parseW,st])

  useEffect(()=>{document.body.className=cfg.uiTheme},[cfg.uiTheme])
  useEffect(()=>{localStorage.setItem('mxd_cfg',JSON.stringify(cfg))},[cfg])
  useEffect(()=>{generate()},[])

  const onMD=useCallback((r,c)=>{setSel(true);setSelS([r,c]);setSelC([[r,c]])},[])
  const onME=useCallback((r,c)=>{if(!sel||!selS)return;const cells=getCB(selS[0],selS[1],r,c);if(cells.length)setSelC(cells)},[sel,selS,getCB])
  const onMU=useCallback(()=>{
    if(!sel||!puzzle){setSel(false);return};setSel(false)
    const s=selC.map(([r,c])=>puzzle.grid[r][c]).join(''),sr=[...s].reverse().join('')
    const placed=Object.keys(puzzle.placements)
    for(const w of placed){
      const ww=cfg.letterCase==='lower'?w.toLowerCase():w.toUpperCase()
      if((s===ww||sr===ww)&&!found.includes(w)){setFound(p=>[...p,w]);st('FOUND: "'+w+'" 🎉','ok');break}
    }
    setSelC([])
  },[sel,puzzle,selC,cfg.letterCase,found,st])

  return(
    <div className="app">
      <Sidebar cfg={cfg} setCfg={setCfg} wordText={wordText} setWordText={setWordText} onGen={generate} onBulk={handleExport} gen={gen} prog={prog} isKing={isKing} onCode={checkCode}/>
      <main className="main">
        <div className="tb">
          <div className="tb-l">
            <div className="vtog"><button className={vw==='puzzle'?'on':''} onClick={()=>setVw('puzzle')}>Puzzle</button><button className={vw==='solution'?'on':''} onClick={()=>setVw('solution')}>Solution</button></div>
            <span className="tb-info">{puzzle?Object.keys(puzzle.placements).length+' words | '+puzzle.rows+'x'+puzzle.cols:'—'}{cfg.bulkMode?<span style={{marginLeft:8,background:'var(--accent)',color:'#fff',fontSize:9,padding:'2px 6px',borderRadius:4,fontWeight:700}}>BULK {cfg.bulkPageCount}</span>:''}</span>
          </div>
          <div className="tb-r">
            <button className="btn btn-sec" onClick={generate} disabled={gen}>🔄</button>
            <button className="btn btn-ok" onClick={handleExport} disabled={gen}>📄 PDF</button>
            <button className="btn btn-pri" onClick={()=>window.print()}>🖨️ Print</button>
          </div>
        </div>
        <div className="pza" style={{justifyContent:'center'}}>
          {window.renderPuzzleCard&&window.renderPuzzleCard(cfg,puzzle,vw,found,gen,setCfg,onMD,onME,onMU,selC)||<div>Loading card...</div>}
        </div>
      </main>
      {toast&&<WS.Toast msg={toast.m} type={toast.t} close={()=>setToast(null)}/>}
    </div>
  )
}

try{ReactDOM.createRoot(document.getElementById('root')).render(<App/>)}catch(e){document.getElementById('root').innerHTML='<div style="color:white;padding:40px;background:#111;"><h2>Error</h2><p>'+e.message+'</p></div>'}
</script>
</body>
</html>
