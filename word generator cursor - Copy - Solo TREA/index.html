<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1f5f9;--panel:#ffffff;--glass:rgba(0,0,0,0.02);--accent:#6366f1;--accent2:#8b5cf6;--accent-light:#eef2ff;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--hl:#6366f1;--font:'Inter',system-ui,-apple-system,sans-serif;--radius:10px;--radius-sm:8px;--radius-xs:6px;--border:rgba(0,0,0,0.06);--border-strong:rgba(0,0,0,0.1);--shadow:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 6px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.06);--shadow-lg:0 10px 25px rgba(0,0,0,0.06),0 4px 10px rgba(0,0,0,0.04);--shadow-xl:0 20px 50px rgba(0,0,0,0.08),0 8px 16px rgba(0,0,0,0.04);--topbar-h:60px;--sidebar-w:360px;--chat-w:360px;--transition-fast:150ms ease;--transition-normal:250ms ease}

body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--topbar-h);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:100;box-shadow:var(--shadow)}
.top-l{display:flex;align-items:center;gap:14px}
.top-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;box-shadow:0 2px 8px rgba(99,102,241,0.25)}
.top-brand h1{font-size:16px;font-weight:700;letter-spacing:-0.4px;line-height:1.2}
.top-brand span{font-size:11px;color:var(--t3);font-weight:500}
.top-nav{display:flex;align-items:center;gap:4px;background:var(--bg);padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.top-nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:none;background:transparent;color:var(--t2);border-radius:var(--radius-xs);cursor:pointer;font-size:12px;font-weight:600;transition:all var(--transition-fast);font-family:var(--font)}
.top-nav-btn:hover{color:var(--t1);background:var(--panel)}
.top-nav-btn.active{color:var(--accent);background:var(--panel);box-shadow:var(--shadow)}

.tool-bar{display:flex;align-items:center;gap:6px}

.tool-btn:hover{background:var(--accent-light);color:var(--accent);transform:translateY(-1px)}

.tool-btn .tool-tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);background:var(--t1);color:var(--bg);padding:6px 10px;border-radius:var(--radius-xs);font-size:11px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:all var(--transition-fast);z-index:1000}

.tog-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:8px 0}

<script>
(function(){
  'use strict';
  function waitForDeps(callback, maxRetries, delay){
    maxRetries = maxRetries || 50;
    delay = delay || 100;
    var attempts = 0;
    function check(){
      attempts++;
      if(typeof React !== 'undefined' && typeof ReactDOM !== 'undefined' && typeof window.App !== 'undefined'){
        console.log('[MXD Init] All components ready (attempt ' + attempts + ')');
        if(callback) callback();
      } else if(attempts < maxRetries){
        setTimeout(check, delay);
      } else {
        console.error('[MXD Init] Components failed to load after ' + maxRetries + ' attempts');
        var root = document.getElementById('root');
        if(root){
          root.innerHTML = '<div style="background:#0f172a;color:#f8fafc;padding:40px;font-family:system-ui;text-align:center;border-radius:16px;max-width:600px;margin:40px auto;"><h1 style="color:#ef4444;margin-bottom:16px;">Load Error</h1><p style="color:#94a3b8;margin-bottom:24px;line-height:1.6;">App components failed to load. Please refresh the page.</p><div style="background:#1e293b;padding:16px;border-radius:8px;text-align:left;margin-bottom:20px;"><p style="color:#e2e8f0;margin:0 0 12px;font-weight:600;">Quick Fix:</p><ol style="color:#94a3b8;margin:0;padding-left:20px;font-size:14px;"><li>Check your internet connection</li><li>Run download-libs.ps1 to download dependencies</li><li>Or use a local server: python -m http.server 8000</li></ol></div><button onclick="location.reload()" style="background:#6366f1;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">Retry</button></div>';
        }
      }
    }
    check();
  }

  function renderWithErrorBoundary(){
    try{
      if(typeof ReactDOM === 'undefined'){
        console.warn('[MXD Init] ReactDOM not ready, retrying...');
        setTimeout(renderWithErrorBoundary, 100);
        return;
      }
      var rootEl = document.getElementById('root');
      if(!rootEl){
        console.error('[MXD Init] #root element not found');
        return;
      }
      if(typeof App === 'undefined'){
        console.warn('[MXD Init] App component not defined yet, retrying...');
        setTimeout(renderWithErrorBoundary, 100);
        return;
      }
      var root = ReactDOM.createRoot(rootEl);
      root.render(React.createElement(App));
      console.log('[MXD Init] App rendered successfully');
    } catch(e){
      console.error('[MXD Init] Render error:', e);
    }
  }

  waitForDeps(function(){
    console.log('[MXD Init] Starting app initialization...');
    if(window.MXDV10Init){
      try { window.MXDV10Init(); console.log('[MXD Init] V10 layers initialized'); }
      catch(e){ console.warn('[MXD Init] V10 init error:', e); }
    }
    if(window.MXDInteractive){
      try { window.MXDInteractive.init(); console.log('[MXD Init] Interactive initialized'); }
      catch(e){ console.warn('[MXD Init] Interactive init error:', e); }
    }
    renderWithErrorBoundary();
  });
})();
</script>
